name: Daily Bible Verse

on:
  schedule:
    # Runs at 12:00 UTC, which is 8:00 AM US Eastern during EDT (summer).
    # IMPORTANT: GitHub Actions cron always uses UTC and does NOT adjust
    # for daylight saving. See the "Timezone" note in README.md for the
    # correct cron value for your local 8 AM year-round.
    - cron: "0 12 * * *"
  workflow_dispatch: {} # allows manual "Run workflow" button for testing

permissions:
  contents: write # needed so the workflow can commit history.json back

jobs:
  post-verse:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post verse to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BIBLE_TRANSLATION: kjv
        run: python bot.py

      - name: Commit updated history
        run: |
          git config user.name "verse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Update verse history [skip ci]"
          git push
